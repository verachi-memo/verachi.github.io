<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verachi — Meet Verachi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      background-color: #000000;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    .optikka-hero {
      background-color: #000000;
      padding: 0.5rem;
      height: 100vh;
      font-family: 'Inter', sans-serif;
      box-sizing: border-box;
    }
    .opt-inner {
      background-color: #E2DDD3;
      border: 1px solid rgba(51, 49, 42, 0.2);
      border-radius: 12px;
      height: 100%;
      position: relative;
      overflow: hidden;
    }
    .opt-line-v {
      position: absolute;
      top: 0; bottom: 0;
      width: 0;
      border-left: 1px dashed rgba(51, 49, 42, 0.3);
    }
    .opt-line-h {
      position: absolute;
      left: 0; right: 0;
      height: 0;
      border-top: 1px dashed rgba(51, 49, 42, 0.3);
    }
    .opt-element {
      position: absolute;
      display: flex;
    }
    .opt-brand {
      font-weight: 700;
      font-size: 1.1rem;
      color: #33312A !important;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      text-decoration: none;
    }
    .opt-brand .kanji {
      font-size: 1.5rem;
      font-weight: 400;
      margin-right: 0.5rem;
    }
    .opt-nav-link {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #33312A !important;
      opacity: 0.6;
      text-decoration: none;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }
    .opt-nav-link:hover {
      opacity: 1;
    }
    .opt-tagline {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #33312A;
      line-height: 1.4;
    }
    .opt-title {
      font-size: clamp(4rem, 9vw, 8.5rem);
      font-weight: 500;
      letter-spacing: -0.06em;
      line-height: 0.9;
      color: #2A2822;
      margin: 0;
    }
    .opt-desc {
      font-size: clamp(1.25rem, 2vw, 2.2rem);
      line-height: 1.3;
      color: #4A463B;
      font-weight: 400;
      margin: 0;
    }
    .text-opt-accent {
      color: #F05D3A;
    }
    .opt-graphic-wrap {
      position: absolute;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .opt-kanji-large {
      font-size: clamp(8rem, 15vw, 15rem);
      font-weight: 400;
      background: linear-gradient(135deg, #FF6B4A 0%, #B83216 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      filter: drop-shadow(0 15px 35px rgba(240, 93, 58, 0.25));
    }
    
    @media (max-width: 768px) {
      .opt-line-v { display: none; }
      .opt-title { font-size: 3.5rem; }
      .opt-desc { font-size: 1.25rem; }
      .opt-element { position: relative; padding: 1.5rem !important; width: 100% !important; left: 0 !important; top: 0 !important; bottom: auto !important; right: 0 !important; }
      .opt-graphic-wrap { position: relative; transform: none; margin: 2rem auto; left: 0 !important; top: 0 !important; }
      .opt-inner { overflow-y: auto; display: flex; flex-direction: column; }
      .opt-line-h { display: none; }
    }
  </style>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NHXTJ2NZMT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-NHXTJ2NZMT');
  </script>
</head>
<body>
  <main>
    <section class="optikka-hero">
      <div class="opt-inner">
        <!-- Grid Lines -->
        <div class="opt-line-v" style="left: 33.33%;"></div>
        <div class="opt-line-v" style="left: 66.66%;"></div>
        <div class="opt-line-h" style="top: 45%;"></div>

        <!-- Elements -->
        <div class="opt-element" style="top: 0; left: 0; padding: 2.5rem 2.5rem;">
          <a href="index.html" class="opt-brand"><span class="kanji">知</span> VERACHI</a>
        </div>
        <div class="opt-element" style="top: 0; left: 33.33%; padding: 2.5rem 2rem;">
          <a href="sales.html" class="opt-nav-link">SALES DECK</a>
        </div>
        <div class="opt-element" style="top: 0; left: 66.66%; padding: 2.5rem 2rem;">
          <a href="story.html" class="opt-nav-link">PRODUCT STORY</a>
        </div>
        <div class="opt-element" style="top: 0; right: 0; padding: 2.5rem 2.5rem;">
          <a href="index.html#plans" class="opt-nav-link">LAUNCH PATHS</a>
        </div>

        <div class="opt-element" style="bottom: 55%; left: 0; padding: 2rem 2.5rem; align-items: flex-end;">
          <span class="opt-tagline">PROJECT<br/>INTELLIGENCE</span>
        </div>

        <div class="opt-element" style="top: 45%; right: 0; padding: 2rem 2.5rem; align-items: flex-start;">
          <a href="#features" class="opt-nav-link">SCROLL DOWN</a>
        </div>

        <div class="opt-graphic-wrap" style="top: 45%; left: 33.33%;">
          <div class="opt-kanji-large">知</div>
        </div>

        <div class="opt-element" style="bottom: 0; left: 0; padding: 2rem 2.5rem; max-width: 66.66%; align-items: flex-end;">
          <h1 class="opt-title">Meet Verachi</h1>
        </div>

        <div class="opt-element" style="bottom: 0; right: 0; width: 50%; padding: 2.5rem; align-items: flex-end;">
          <p class="opt-desc">
            Verachi redefines decision workflows, empowering you to scale engineering, protect institutional memory, and launch faster—unlocking your <span class="text-opt-accent">true velocity.</span>
          </p>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
