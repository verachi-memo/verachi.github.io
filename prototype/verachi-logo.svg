<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 100 100"
  fill="none"
>
  <defs>
    <linearGradient id="verachi-logo-right" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <linearGradient id="verachi-logo-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488" />
      <stop offset="40%" stop-color="#14b8a6" />
      <stop offset="80%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <filter id="verachi-logo-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="5" stdDeviation="3" flood-opacity="0.3" />
    </filter>
  </defs>

  <g transform="translate(65, 50) rotate(26)">
    <rect x="-15" y="-40" width="30" height="80" rx="15" fill="url(#verachi-logo-right)" />
  </g>

  <g transform="translate(35, 50) rotate(-26)">
    <rect
      x="-15"
      y="-40"
      width="30"
      height="80"
      rx="15"
      fill="url(#verachi-logo-left)"
      filter="url(#verachi-logo-shadow)"
    />
  </g>
</svg>
